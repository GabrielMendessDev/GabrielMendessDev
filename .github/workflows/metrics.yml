name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GabrielMendessDev
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          
          plugin_achievements: no
          plugin_habits: no
          
          # Estilo All Black
          custom_tags: |
            <style>
              svg { background-color: #050505 !important; color: #ffffff !important; }
              h2, h3 { color: #00ABFD !important; }
              .field, .lang-name { color: #ffffff !important; }
            </style>
