name: Metrics
on:
  # Atualiza automaticamente todos os dias à meia-noite
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GabrielMendessDev
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          
          # Plugin de Linguagens
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          
          # Plugin de Conquistas (Troféus)
          plugin_achievements: no
          plugin_achievements_limit: 6
          plugin_achievements_display: compact
          
          # Estilo Minimalista e Escuro
          custom_tags: |
            <style>
              svg { background-color: #050505; color: #ffffff; }
              h2, h3 { color: #00ABFD !important; }
              .field { color: #ffffff; }
            </style>
