name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GabrielMendessDev
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          
          # Plugin de Linguagens
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          
          # Plugin de Hábitos (Substituindo as Conquistas)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: no
          plugin_habits_charts: yes
          
          # Força o estilo All Black e oculta o fundo padrão
          custom_tags: |
            <style>
              svg { background-color: #050505 !important; color: #ffffff !important; }
              h2, h3 { color: #00ABFD !important; }
              .field, .lang-name { color: #ffffff !important; }
            </style>
